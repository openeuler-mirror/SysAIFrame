<!DOCTYPE busconfig PUBLIC "-//freedesktop//DTD D-BUS Bus Configuration 1.0//EN"
 "http://www.freedesktop.org/standards/dbus/1.0/busconfig.dtd">
<busconfig>
  <!-- 
    D-Bus System Bus Configuration for SysAIFrame AI Gateway
    
    Installation:
    1. Copy this file to /etc/dbus-1/system.d/ai-gateway.conf
    2. Reload D-Bus configuration:
       sudo systemctl reload dbus
       or
       sudo kill -HUP $(pidof dbus-daemon)
    
    Security Notes:
    - Adjust user/group permissions according to your security policy
    - In production, restrict access to specific users/groups
  -->
  
  <!-- Define policy for the AI Gateway service -->
  <policy context="default">
    <!-- Allow anyone to call org.ctyunos.AIGateway.Chat methods -->
    <allow send_destination="org.ctyunos.AIGateway.Chat"
           send_interface="org.ctyunos.AIGateway.Chat"/>
    
    <!-- Allow receiving signals from the service -->
    <allow receive_sender="org.ctyunos.AIGateway.Chat"
           receive_interface="org.ctyunos.AIGateway.Chat"
           receive_type="signal"/>
  </policy>
  
  <!-- Policy for the AI Gateway service itself (owns the bus name) -->
  <!-- Allow root to own the AI Gateway service name -->
  <policy user="root">
    <allow own="org.ctyunos.AIGateway.Chat"/>
    <allow send_destination="org.ctyunos.AIGateway.Chat"/>
    <allow receive_sender="org.ctyunos.AIGateway.Chat"/>
  </policy>
  
  <!-- Allow sysaiframe user to own the service (service runs as this user) -->
  <policy user="sysaiframe">
    <allow own="org.ctyunos.AIGateway.Chat"/>
    <allow send_destination="org.ctyunos.AIGateway.Chat"/>
    <allow receive_sender="org.ctyunos.AIGateway.Chat"/>
  </policy>
  
  <!-- Policy for ai-admin group (if exists) -->
  <policy group="ai-admins">
    <!-- Allow group members to own the service -->
    <allow own="org.ctyunos.AIGateway.Chat"/>
    <!-- Full access to AI Gateway -->
    <allow send_destination="org.ctyunos.AIGateway.Chat"/>
    <allow receive_sender="org.ctyunos.AIGateway.Chat"/>
  </policy>
  
  <!-- Policy for regular AI users group (if exists) -->
  <policy group="ai-users">
    <!-- Allow calling methods (read-only operations preferred) -->
    <allow send_destination="org.ctyunos.AIGateway.Chat"
           send_interface="org.ctyunos.AIGateway.Chat"
           send_member="ChatCompletion"/>
    <allow send_destination="org.ctyunos.AIGateway.Chat"
           send_interface="org.ctyunos.AIGateway.Chat"
           send_member="GetChatModels"/>
    <allow send_destination="org.ctyunos.AIGateway.Chat"
           send_interface="org.ctyunos.AIGateway.Chat"
           send_member="GetStatus"/>
    
    <!-- Allow receiving signals -->
    <allow receive_sender="org.ctyunos.AIGateway.Chat"
           receive_interface="org.ctyunos.AIGateway.Chat"
           receive_type="signal"/>
  </policy>
  
  <!-- 
    Development/Testing Policy (Session Bus Alternative)
    
    For development on systems without root access, you can:
    1. Use session bus instead of system bus
    2. Set use_system_bus=False when initializing DBusAIGatewayService
    3. No configuration file needed for session bus
  -->
</busconfig>

